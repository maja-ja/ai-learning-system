# Cloudflare Tunnel（cloudflared）範例：將 etymon-decoder.com 橋接到本機或內網服務
# 使用方式：
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create etymon-decoder
#   3. 複製此檔為 config.yml，填入 tunnel UUID、credentials 路徑
#   4. 在 Cloudflare DNS 將主機名設為 CNAME 到 <tunnel-id>.cfargotunnel.com
#
# 情境 A：同一台機器上 Nginx 反代「靜態前端 + /api → uvicorn」→ 只開一個 service :80
# 情境 A′：無 Nginx — `python serve_portable.py`（SERVE_WEB_DIST）→ Tunnel 指 http://127.0.0.1:8000，見 docs/deploy/PORTABLE-ANY-MACHINE.md
# 情境 B：前端 Cloudflare Pages、API 子網域 → 兩個 hostname 如下

# tunnel: <YOUR_TUNNEL_UUID>
# credentials-file: /path/to/<UUID>.json

ingress:
  # 網站（Vite build 靜態或由 Nginx 提供）
  - hostname: etymon-decoder.com
    service: http://127.0.0.1:8080
  - hostname: www.etymon-decoder.com
    service: http://127.0.0.1:8080
  # FastAPI（若與前端分開；並在 Pages 設定 VITE_API_BASE_URL）
  - hostname: api.etymon-decoder.com
    service: http://127.0.0.1:8000
  - service: http_status:404
