# 範例：Nginx 同時提供 Vite 建置結果 + 反代 FastAPI
# 使用方式：複製到 /etc/nginx/sites-available/，修改 server_name、ssl_certificate、root 路徑後啟用。

upstream etymon_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name etymon-decoder.com www.etymon-decoder.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name etymon-decoder.com www.etymon-decoder.com;

    # certbot 產生的路徑
    ssl_certificate     /etc/letsencrypt/live/etymon-decoder.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/etymon-decoder.com/privkey.pem;

    # 改成你伺服器上 ai-learning-system/web/dist 的絕對路徑
    root /var/www/etymon-decoder/web/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/ {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /decode {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /notes {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 預設另有 ReDoc
    location /redoc {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://etymon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA：其餘路徑交給 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
