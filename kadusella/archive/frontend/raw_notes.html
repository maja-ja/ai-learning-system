<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RAW NOTES</title>
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">

    <style>
        :root {
            --border-width: 2px;
            --main-color: #000;
            --bg-color: #fff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: "Courier New", Courier, "Noto Sans TC", monospace;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--main-color);
            overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100vh;
            background: var(--bg-color); position: relative;
            display: flex; flex-direction: column;
        }

        /* Header */
        .header {
            padding-top: var(--safe-top); padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            border-bottom: var(--border-width) solid var(--main-color); background: white; z-index: 100;
        }
        .header-top { display: flex; align-items: center; height: 50px; gap: 15px; }
        .back-btn { width: 40px; height: 40px; border: var(--border-width) solid var(--main-color); display: none; justify-content: center; align-items: center; cursor: pointer; font-weight: 900; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; text-transform: uppercase; flex: 1; letter-spacing: -1px; }

        /* 搜尋列 */
        .search-bar { margin-top: 10px; display: none; border: var(--border-width) solid var(--main-color); padding: 8px; background: #f0f0f0; align-items: center; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; font-family: inherit; font-weight: bold; }
        .clear-search { cursor: pointer; font-weight: 900; padding: 0 5px; }

        /* 內容區 */
        .page-container { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; width: 100%; height: 100%; padding: 15px; display: none; flex-direction: column; background: var(--bg-color); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page.active { display: flex; }

        /* 網格美學 */
        .note-grid { padding-bottom: 100px; }
        .note-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .layout-a .stack { display: flex; flex-direction: column; gap: 12px; }
        .layout-a .big { grid-column: 2; }
        .layout-b .stack { grid-column: 2; display: flex; flex-direction: column; gap: 12px; }
        .layout-b .big { grid-column: 1; grid-row: 1; }

        /* 卡片設計 */
        .block { border: var(--border-width) solid var(--main-color); background: var(--bg-color); padding: 12px; cursor: pointer; display: flex; flex-direction: column; position: relative; }
        .block:active { transform: translate(2px, 2px); }
        .note-ts { font-size: 9px; font-weight: 900; margin-bottom: 4px; color: #666; }
        .note-title { font-weight: 900; font-size: 15px; margin-bottom: 6px; text-transform: uppercase; line-height: 1.1; word-break: break-all; }
        .note-preview { font-size: 11px; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; margin-bottom: 8px; opacity: 0.6; }
        .tag-pill { font-size: 8px; border: 1px dashed #000; padding: 1px 4px; width: fit-content; text-transform: uppercase; margin-top: auto; }

        .block-sm { height: 125px; }
        .block-lg { height: 262px; }
        .empty-dash { border: var(--border-width) dashed #ddd; cursor: default; }

        /* 編輯器 */
        .editor-status { font-size: 9px; font-weight: 900; color: #2ecc71; height: 15px; margin-bottom: 5px; }
        .editor-title { width: 100%; border: none; border-bottom: 3px solid var(--main-color); font-size: 26px; font-weight: 900; padding: 10px 0; outline: none; font-family: inherit; }
        .editor-tags { width: 100%; border: none; font-size: 12px; padding: 8px 0; outline: none; font-family: inherit; border-bottom: 1px dashed #ccc; color: #666; }
        .editor-content { width: 100%; flex: 1; border: none; resize: none; font-size: 18px; line-height: 1.6; outline: none; font-family: inherit; padding-top: 15px; background: repeating-linear-gradient(transparent, transparent 28px, #f9f9f9 28px, #f9f9f9 29px); }

        /* 底部導航 */
        .footer { padding-bottom: calc(var(--safe-bottom) + 10px); padding-left: 20px; padding-right: 20px; padding-top: 15px; border-top: var(--border-width) solid var(--main-color); display: grid; grid-template-columns: 60px 1fr; gap: 12px; background: white; }
        .btn-black { background: var(--main-color); color: var(--bg-color); font-weight: 900; display: flex; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        .btn-ghost { font-size: 10px; border-style: dotted; display: flex; justify-content: center; align-items: center; text-align: center; cursor: pointer; font-weight: 900; }
        
        .empty-state { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.2; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-top">
            <div id="back-btn" class="back-btn" onclick="exitEditor()">←</div>
            <h1 id="view-title">Raw Notes</h1>
            <div id="search-btn" onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;">🔍</div>
        </div>
        <div id="search-bar" class="search-bar">
            <input type="text" id="search-input" placeholder="FILTER..." oninput="doSearch()">
            <span class="clear-search" onclick="toggleSearch()">✕</span>
        </div>
    </div>

    <div class="page-container">
        <!-- 列表頁 -->
        <div id="page-home" class="page active">
            <div id="note-grid" class="note-grid"></div>
            <div id="empty-msg" class="empty-state">NO_DATA_FOUND</div>
        </div>

        <!-- 編輯頁 -->
        <div id="page-detail" class="page">
            <div class="editor-status" id="save-indicator"></div>
            <div class="note-ts" id="edit-ts" style="margin-bottom:5px;"></div>
            <input type="text" id="edit-title" class="editor-title" placeholder="UNTITLED" oninput="autoSave()">
            <input type="text" id="edit-tags" class="editor-tags" placeholder="#TAGS" oninput="autoSave()">
            <textarea id="edit-content" class="editor-content" placeholder="WRITE_HERE..." oninput="autoSave()"></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div id="ai-decode-btn" class="block btn-black" style="font-size: 14px;" onclick="decodeCurrentNote()">✨ AI DECODE</div>
                <div class="block btn-ghost" onclick="shareNote()">SHARE</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-bottom: 30px;">
                <div class="block btn-ghost" onclick="copyNote()">COPY</div>
                <div class="block btn-ghost" style="color:red; border-color:red;" onclick="deleteNote()">DELETE</div>
            </div>
        </div>
    </div>

    <!-- 移除了 GIFT 按鈕，只剩 JSON 和 NEW NOTE -->
    <div class="footer" id="footer-nav">
        <div class="block btn-ghost" onclick="exportJSON()">JSON</div>
        <div class="block btn-black" onclick="createNewNote()">＋ NEW NOTE</div>
    </div>
</div>

<script>
    let notes = [];
    let curId = null;
    let saveTimeout = null;

    const AI_FEATURE_LOCKED = true;
    const AI_LOCK_MESSAGE = "🚧 AI 功能暫時鎖定中，優化完成後再開放。";
    const isLocalHost = ['127.0.0.1', 'localhost'].includes(window.location.hostname);
    const API_PREFIX = (window.location.protocol === 'file:' || (isLocalHost && window.location.port !== '8000'))
        ? 'http://127.0.0.1:8000'
        : '';

    function applyNoteMeta(note, fallbackDate = new Date()) {
        const source = note.created_at || note.updated_at;
        let dt = source ? new Date(source) : fallbackDate;
        if (Number.isNaN(dt.getTime())) dt = fallbackDate;
        note.date = dt.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' }).toUpperCase();
        note.time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return note;
    }

    async function loadNotes() {
        try {
            const res = await fetch(`${API_PREFIX}/notes`);
            if (!res.ok) throw new Error('Failed to fetch notes');
            const data = await res.json();
            notes = (data.data || []).map(n => applyNoteMeta({ ...n }));
            if (!notes.length) {
                const saved = localStorage.getItem('raw_notes_v1.2');
                notes = saved ? JSON.parse(saved) : [];
            }
        } catch (e) {
            console.warn('Load notes failed, using localStorage fallback', e);
            const saved = localStorage.getItem('raw_notes_v1.2');
            notes = saved ? JSON.parse(saved) : [];
        }
        render(notes);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    }

    function init() {
        if (AI_FEATURE_LOCKED) {
            const aiBtn = document.getElementById('ai-decode-btn');
            if (aiBtn) {
                aiBtn.innerText = 'AI LOCKED';
                aiBtn.style.background = '#888';
                aiBtn.style.cursor = 'not-allowed';
            }
        }
        loadNotes();
    }

    function render(data) {
        const grid = document.getElementById('note-grid');
        const empty = document.getElementById('empty-msg');
        grid.innerHTML = '';
        empty.style.display = data.length ? 'none' : 'flex';

        for (let i = 0; i < data.length; i += 3) {
            const isB = Math.floor(i / 3) % 2 === 1;
            const group = document.createElement('div');
            group.className = `note-group ${isB ? 'layout-b' : 'layout-a'}`;
            
            const n = [data[i], data[i+1], data[i+2]];
            let stack = `<div class="stack">`;
            stack += n[0] ? cardHtml(n[0], 'block-sm') : `<div class="block block-sm empty-dash"></div>`;
            stack += n[1] ? cardHtml(n[1], 'block-sm') : `<div class="block block-sm empty-dash"></div>`;
            stack += `</div>`;
            
            let big = n[2] ? cardHtml(n[2], 'block-lg big') : `<div class="block block-lg big empty-dash"></div>`;
            group.innerHTML = isB ? (big + stack) : (stack + big);
            grid.appendChild(group);
        }
    }

    function cardHtml(n, cls) {
        return `<div class="block ${cls}" onclick="openNote(${n.id})">
            <div class="note-ts">${n.date} ${n.time}</div>
            <div class="note-title">${n.title || 'UNTITLED'}</div>
            <div class="note-preview">${n.content || ''}</div>
            ${n.tags ? `<div class="tag-pill">${n.tags}</div>` : ''}
        </div>`;
    }

    async function createNewNote() {
        const payload = { title: "", content: "", tags: "" };
        try {
            const res = await fetch(`${API_PREFIX}/notes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try {
                    const err = await res.json();
                    msg = err.detail || msg;
                } catch (_) {}
                throw new Error(msg);
            }
            const data = await res.json();
            const newNote = applyNoteMeta(data.data || { ...payload, id: Date.now() });
            notes.unshift(newNote);
            render(notes);
            openNote(newNote.id);
        } catch (e) {
            console.error('Create note failed', e);
            alert(`無法建立筆記：${e.message}`);
        }
    }

    function openNote(id) {
        curId = id;
        const n = notes.find(x => x.id === id);
        if (!n) return;
        document.getElementById('edit-title').value = n.title || "";
        document.getElementById('edit-content').value = n.content || "";
        document.getElementById('edit-tags').value = n.tags || "";
        document.getElementById('edit-ts').innerText = `CREATED: ${n.date || ''} ${n.time || ''}`;
        document.getElementById('save-indicator').innerText = "";
        navTo('page-detail');
    }

    function autoSave() {
        document.getElementById('save-indicator').innerText = "TYPING...";
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            const n = notes.find(x => x.id === curId);
            if (n) {
                n.title = document.getElementById('edit-title').value;
                n.content = document.getElementById('edit-content').value;
                n.tags = document.getElementById('edit-tags').value;
                document.getElementById('save-indicator').innerText = "SAVING...";
                try {
                    const res = await fetch(`${API_PREFIX}/notes/${n.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: n.title, content: n.content, tags: n.tags })
                    });
                    if (!res.ok) {
                        let msg = `HTTP ${res.status}`;
                        try {
                            const err = await res.json();
                            msg = err.detail || msg;
                        } catch (_) {}
                        throw new Error(msg);
                    }
                    const data = await res.json();
                    const updated = data.data || {};
                    n.updated_at = updated.updated_at;
                    n.created_at = updated.created_at || n.created_at;
                    applyNoteMeta(n);
                    render(notes);
                    document.getElementById('save-indicator').innerText = "SAVED ✓";
                    localStorage.setItem('raw_notes_v1.2', JSON.stringify(notes));
                } catch (e) {
                    console.error('Save failed', e);
                    document.getElementById('save-indicator').innerText = "SAVE FAILED";
                }
            }
        }, 800);
    }

    function save() { localStorage.setItem('raw_notes_v1.2', JSON.stringify(notes)); }

    async function exitEditor() {
        const n = notes.find(x => x.id === curId);
        if (n && !n.title.trim() && !n.content.trim()) {
            try {
                await fetch(`${API_PREFIX}/notes/${n.id}`, { method: 'DELETE' });
            } catch (e) { console.warn('delete failed', e); }
            notes = notes.filter(x => x.id !== curId);
        }
        save(); render(notes); navTo('page-home');
    }

    async function shareNote() {
        const t = document.getElementById('edit-title').value;
        const c = document.getElementById('edit-content').value;
        if (navigator.share) {
            try { await navigator.share({ title: t, text: `${t}\n\n${c}` }); } catch(e) {}
        } else { copyNote(); }
    }

    function copyNote() {
        const t = document.getElementById('edit-title').value;
        const c = document.getElementById('edit-content').value;
        navigator.clipboard.writeText(`${t}\n${c}`);
        alert('COPIED!');
    }

    async function deleteNote() {
        if (confirm('DELETE?')) {
            try {
                await fetch(`${API_PREFIX}/notes/${curId}`, { method: 'DELETE' });
            } catch (e) { console.warn('delete failed', e); }
            notes = notes.filter(x => x.id !== curId);
            save(); render(notes); navTo('page-home');
        }
    }

    // 👇 關鍵除錯版 AI 連線邏輯
    async function decodeCurrentNote() {
        if (AI_FEATURE_LOCKED) {
            alert(AI_LOCK_MESSAGE);
            return;
        }

        const n = notes.find(x => x.id === curId);
        if (!n || (!n.title && !n.content)) {
            alert("請先輸入一些內容！");
            return;
        }

        const indicator = document.getElementById('save-indicator');
        indicator.innerText = "AI THINKING...";
        indicator.style.color = "#007AFF"; 

        try {
            // 嘗試呼叫後端
            const response = await fetch(`${API_PREFIX}/decode`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    text: `TITLE: ${n.title}\nCONTENT: ${n.content}`
                })
            });

            // 處理結果
            if (response.ok) {
                const resJson = await response.json();
                indicator.innerText = "DECODED ✓";
                indicator.style.color = "#2ecc71";
                alert(`✅ 成功！\n已將「${resJson.data.word}」存入知識庫。`);
            } else {
                // 🔥 這裡會捕捉 API Key 錯誤或其他 500 錯誤
                const errorData = await response.json();
                const errorDetail = errorData.detail || "Server Error";
                throw new Error(errorDetail); // 把錯誤丟給下面的 catch 顯示
            }
        } catch (error) {
            console.error(error);
            indicator.innerText = "FAILED";
            indicator.style.color = "red";
            
            // 🔥 彈出具體的錯誤訊息
            alert(`❌ 發生錯誤：\n${error.message}\n\n(若是 NetworkError，請確認終端機是否已輸入 python start.py)`);
        }
    }

    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "raw_notes_backup.json");
        dl.click();
    }

    function toggleSearch() {
        const b = document.getElementById('search-bar');
        const inp = document.getElementById('search-input');
        if (b.style.display === 'flex') {
            b.style.display = 'none'; inp.value = ''; render(notes);
        } else {
            b.style.display = 'flex'; inp.focus();
        }
    }

    function doSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const res = notes.filter(x => (x.title || '').toLowerCase().includes(q) || (x.content || '').toLowerCase().includes(q) || (x.tags || '').toLowerCase().includes(q));
        render(res);
    }

    function navTo(p) {
        const isH = p === 'page-home';
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('view-title').innerText = isH ? 'Raw Notes' : 'Edit';
        document.getElementById('back-btn').style.display = isH ? 'none' : 'flex';
        document.getElementById('footer-nav').style.display = isH ? 'grid' : 'none';
        document.getElementById('search-btn').style.display = isH ? 'block' : 'none';
    }

    init();
</script>

</body>
</html>
